---
resource_types:
  - name: bosh-deployment
    type: registry-image
    source:
      repository: cloudfoundry/bosh-deployment-resource
      username: ((docker.username))
      password: ((docker.password))

resources:
  - name: bosh-agent
    type: git
    source:
      uri: https://github.com/cloudfoundry/bosh-agent.git
      branch: resolute-integ-test
      username: bosh-admin-bot
      password: ((github_read_write_token))

  - name: bosh-agent-ci
    type: git
    source:
      uri: https://github.com/cloudfoundry/bosh-agent.git
      branch: resolute-integ-test
      paths:
        - ci

  - name: bosh-ecosystem-concourse
    type: git
    source:
      uri: https://github.gwd.broadcom.net/TNZ/bosh-ecosystem-concourse.git
      username: svc.bosh-ecosystem@broadcom.net
      password: ((svc-bosh-ecosystem-ghe-personal-access-token))
    tags: [ broadcom ]

  - name: bosh-agent-registry-image
    type: registry-image
    source:
      repository: ghcr.io/cloudfoundry/bosh-agent
      username: ((github_read_write_packages.username))
      password: ((github_read_write_packages.password))

  - name: azure-stemcell-resolute
    type: bosh-io-stemcell
    source:
      name: bosh-azure-hyperv-ubuntu-resolute

  - name: azure-stemcell-noble
    type: bosh-io-stemcell
    source:
      name: bosh-azure-hyperv-ubuntu-noble

  - name: azure-stemcell
    type: bosh-io-stemcell
    source:
      name: bosh-azure-hyperv-ubuntu-jammy-go_agent

  - name: integration-vm-deployment-resolute
    type: bosh-deployment
    source:
      deployment: bosh-agent-integration-resolute
      target: ((iaas_directors_azure-director_bosh_environment))
      client: ((iaas_directors_azure-director_bosh_client.username))
      client_secret: ((iaas_directors_azure-director_bosh_client.password))
      ca_cert: ((iaas_directors_azure-director_bosh_ca_cert.ca))
      jumpbox_ssh_key: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
      jumpbox_username: ((iaas_directors_azure-director_bosh_jumpbox_username))
      jumpbox_url: ((iaas_directors_azure-director_bosh_jumpbox_ip)):22

  - name: integration-vm-deployment-noble
    type: bosh-deployment
    source:
      deployment: bosh-agent-integration-noble
      target: ((iaas_directors_azure-director_bosh_environment))
      client: ((iaas_directors_azure-director_bosh_client.username))
      client_secret: ((iaas_directors_azure-director_bosh_client.password))
      ca_cert: ((iaas_directors_azure-director_bosh_ca_cert.ca))
      jumpbox_ssh_key: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
      jumpbox_username: ((iaas_directors_azure-director_bosh_jumpbox_username))
      jumpbox_url: ((iaas_directors_azure-director_bosh_jumpbox_ip)):22

  - name: integration-vm-deployment-jammy
    type: bosh-deployment
    source:
      deployment: bosh-agent-integration-jammy
      target: ((iaas_directors_azure-director_bosh_environment))
      client: ((iaas_directors_azure-director_bosh_client.username))
      client_secret: ((iaas_directors_azure-director_bosh_client.password))
      ca_cert: ((iaas_directors_azure-director_bosh_ca_cert.ca))
      jumpbox_ssh_key: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
      jumpbox_username: ((iaas_directors_azure-director_bosh_jumpbox_username))
      jumpbox_url: ((iaas_directors_azure-director_bosh_jumpbox_ip)):22

jobs:
  - name: where-am-i-defined
    plan:
      - task: where-am-i-defined
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: bash
          run:
            path: bash
            args:
              - -ec
              - |
                echo '🧭'
                echo 'Repo:   bosh-agent'
                echo 'Branch: resolute-integ-test'
                echo 'File:   ci/test-delete-when-finished-resolute.yml'

  - name: test-integration-resolute
    plan:
      - in_parallel:
          - get: bosh-agent
            trigger: true
          - get: bosh-agent-ci
          - get: bosh-ecosystem-concourse
            tags: [ broadcom ]
          - get: bosh-agent-registry-image
            trigger: true
          - get: azure-stemcell-resolute
            trigger: true
      - do:
          - task: update-resurrection-config
            image: bosh-agent-registry-image
            config:
              platform: linux
              inputs:
                - name: bosh-agent
                - name: bosh-ecosystem-concourse
              params:
                BOSH_ENVIRONMENT: ((iaas_directors_azure-director_bosh_environment))
                BOSH_CA_CERT: ((iaas_directors_azure-director_bosh_ca_cert.ca))
                BOSH_CLIENT: ((iaas_directors_azure-director_bosh_client.username))
                BOSH_CLIENT_SECRET: ((iaas_directors_azure-director_bosh_client.password))
                JUMPBOX_PRIVATE_KEY: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
                JUMPBOX_USERNAME: ((iaas_directors_azure-director_bosh_jumpbox_username))
                JUMPBOX_IP: ((iaas_directors_azure-director_bosh_jumpbox_ip))
              run:
                path: /bin/bash
                args:
                  - -c
                  - |
                    source bosh-ecosystem-concourse/tasks/shared/configure_bosh_proxy.sh
                    bosh -n update-config --name resolute-resurrection --type resurrection --var deployment_name=bosh-agent-integration-resolute bosh-agent/integration/assets/resurrection_config.yml
          - put: integration-vm-deployment-resolute
            attempts: 2
            params:
              cleanup: true
              manifest: "bosh-agent/integration/assets/agent-deployment.yml"
              stemcells:
                - "azure-stemcell-resolute/*.tgz"
              vars:
                deployment_name: bosh-agent-integration-resolute
                stemcell_os: ubuntu-resolute
                az: z1
                vm_type: root_disk_integration

          - task: get-agent-info
            image: bosh-agent-registry-image
            config:
              platform: linux
              inputs:
                - name: bosh-agent
                - name: bosh-ecosystem-concourse
              outputs:
                - name: agent-info
              params:
                BOSH_ENVIRONMENT: ((iaas_directors_azure-director_bosh_environment))
                BOSH_CA_CERT: ((iaas_directors_azure-director_bosh_ca_cert.ca))
                BOSH_CLIENT: ((iaas_directors_azure-director_bosh_client.username))
                BOSH_CLIENT_SECRET: ((iaas_directors_azure-director_bosh_client.password))
                JUMPBOX_PRIVATE_KEY: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
                JUMPBOX_USERNAME: ((iaas_directors_azure-director_bosh_jumpbox_username))
                JUMPBOX_URL: "((iaas_directors_azure-director_bosh_jumpbox_ip)):22"
                CREDHUB_CA_CERT_STRING: ((iaas_directors_azure-director_bosh_credhub_ca_cert.ca))
                CREDHUB_CLIENT: ((iaas_directors_azure-director_bosh_credhub_client.username))
                CREDHUB_SECRET: ((iaas_directors_azure-director_bosh_credhub_client.password))
                CREDHUB_SERVER: ((iaas_directors_azure-director_bosh_credhub_server))
              run:
                path: /bin/bash
                args:
                  - -c
                  - |
                    source bosh-ecosystem-concourse/tasks/shared/configure_credhub_proxies.sh
                    bosh -d bosh-agent-integration-resolute instances --json --column ips | jq -r '.Tables[].Rows[]?.ips // empty' > agent-info/agent_ip
                    credhub get -n /concourse/bosh-agent-integration-resolute/ssh_creds -k private_key > agent-info/agent-creds.pem
                    chmod 600 agent-info/agent-creds.pem
          - task: test-integration
            image: bosh-agent-registry-image
            file: bosh-agent-ci/ci/tasks/test-integration.yml
            params:
              BOSH_DEPLOYMENT: bosh-agent-integration-resolute
              BOSH_ENVIRONMENT: ((iaas_directors_azure-director_bosh_environment))
              BOSH_CA_CERT: ((iaas_directors_azure-director_bosh_ca_cert.ca))
              BOSH_CLIENT: ((iaas_directors_azure-director_bosh_client.username))
              BOSH_CLIENT_SECRET: ((iaas_directors_azure-director_bosh_client.password))
              JUMPBOX_PRIVATE_KEY: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
              JUMPBOX_USERNAME: ((iaas_directors_azure-director_bosh_jumpbox_username))
              JUMPBOX_IP: ((iaas_directors_azure-director_bosh_jumpbox_ip))
        ensure:
          in_parallel:
            - task: clean-credhub
              file: bosh-ecosystem-concourse/tasks/shared/delete-credhub-entries.yml
              image: bosh-agent-registry-image
              params:
                CREDHUB_CA_CERT_STRING: ((iaas_directors_azure-director_bosh_credhub_ca_cert.ca))
                CREDHUB_CLIENT: ((iaas_directors_azure-director_bosh_credhub_client.username))
                CREDHUB_SECRET: ((iaas_directors_azure-director_bosh_credhub_client.password))
                CREDHUB_SERVER: ((iaas_directors_azure-director_bosh_credhub_server))
                JUMPBOX_PRIVATE_KEY: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
                JUMPBOX_URL: "((iaas_directors_azure-director_bosh_jumpbox_ip)):22"
                PATH_TO_DELETE: "/concourse/bosh-agent-integration-resolute"
            - task: update-resurrection-config
              image: bosh-agent-registry-image
              config:
                platform: linux
                inputs:
                  - name: bosh-agent
                  - name: bosh-ecosystem-concourse
                params:
                  BOSH_ENVIRONMENT: ((iaas_directors_azure-director_bosh_environment))
                  BOSH_CA_CERT: ((iaas_directors_azure-director_bosh_ca_cert.ca))
                  BOSH_CLIENT: ((iaas_directors_azure-director_bosh_client.username))
                  BOSH_CLIENT_SECRET: ((iaas_directors_azure-director_bosh_client.password))
                  JUMPBOX_PRIVATE_KEY: ((iaas_directors_azure-director_bosh_jumpbox_ssh.private_key))
                  JUMPBOX_USERNAME: ((iaas_directors_azure-director_bosh_jumpbox_username))
                  JUMPBOX_IP: ((iaas_directors_azure-director_bosh_jumpbox_ip))
                run:
                  path: /bin/bash
                  args:
                    - -c
                    - |
                      source bosh-ecosystem-concourse/tasks/shared/configure_bosh_proxy.sh
                      bosh -n delete-config --name resolute-resurrection --type resurrection
            - put: integration-vm-deployment-resolute
              params:
                cleanup: true
                delete:
                  enabled: true
                  force: true

